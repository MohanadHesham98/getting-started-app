name: Docker CI/CD & Deploy to EC2

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      #  Checkout project code
      - name: Checkout code
        uses: actions/checkout@v3

      # Setup Docker Buildx
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      #  Login to GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: mohanadhesham98
          password: ${{ secrets.GHCR_TOKEN }}

      #  Build and push Docker image
      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/mohanadhesham98/getting-started-app:latest

      # 5️⃣ Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Stop old container if exists
            docker stop getting-started-app || true
            docker rm getting-started-app || true
            # Run new container
            docker run -d -p 3000:3000 --name getting-started-app ghcr.io/mohanadhesham98/getting-started-app:latest
